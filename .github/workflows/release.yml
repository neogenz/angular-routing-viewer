name: publish

# Ship a version: bump it, then push a tag.
#   npm version patch   # bumps package.json + creates the git tag
#   git push --follow-tags
# Publishes to npm via Trusted Publishing (OIDC) — no token to store.
# One-time: add this repo + workflow as a Trusted Publisher on the npm package
# (npmjs.com -> package -> Settings -> Trusted Publisher).

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN: OIDC handles auth, provenance is attached automatically.
      - run: npm publish
